# Antes do primeiro deploy: Settings → Pages → Source = GitHub Actions.
# (Sem isso, o job "deploy" pode falhar com 404 — não é problema do Vite.)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Igual aos starters oficiais: não cancelar deploy em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/
        run: npm run build

      # deploy-pages@v5 exige artefato via upload-artifact v4+ (v3 do upload-pages-artifact não serve).
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
